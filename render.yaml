services:
  - type: web
    name: ai-trainer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_OPENAI
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false

  - type: worker
    name: ai-trainer-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m celery -A backend.workers.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: USE_OPENAI
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
